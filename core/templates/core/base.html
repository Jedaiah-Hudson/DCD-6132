<!DOCTYPE html>
<html>
<head>
    <title>{{ template_data.title }}</title>
</head>
<body>

<nav>
    {% if user.is_authenticated %}
    <a href="/">Dashboard</a> |
    <a href="/notifications/">Notifications</a> |
    <a href="/profile/">Profile</a> |
    <form method="post" action="/accounts/logout/" style="display:inline;">
        {% csrf_token %}
        <button
            type="submit"
            style="background:none;border:none;padding:0;margin:0;color:inherit;text-decoration:underline;cursor:pointer;font:inherit;"
        >
            Logout
        </button>
    </form>
    {% else %}
    <a href="/accounts/login-vis/">Sign In</a> |
    <a href="/accounts/signup-vis/">Sign Up</a>
    {% endif %}
</nav>

<hr>

{% block content %}{% endblock content %}

</body>
</html>
